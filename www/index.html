<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriverFlux - Controle Financeiro</title>
    <style>
        :root {
            --bg-principal: #f4f6f9;
            --card-bg: #ffffff;
            --texto: #2d3748;
            --texto-secundario: #718096;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 14px;
            color: var(--texto-secundario);
            margin-top: 4px;
        }

        .btn-group-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .btn-success { background: var(--success); color: white; grid-column: span 2; }
        
        .btn-warning { background: var(--warning); color: white; padding: 8px 14px; font-size: 13px; border-radius: 8px; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--texto);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px;
            font-size: 12px;
            color: var(--texto-secundario);
            border-bottom: 2px solid #edf2f7;
            text-transform: uppercase;
        }

        td {
            padding: 14px 10px;
            font-size: 14px;
            border-bottom: 1px solid #edf2f7;
        }

        .row-id { font-weight: bold; color: var(--texto-secundario); }
        .row-cliente { font-weight: 600; color: var(--texto); }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .result-row.total-final {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #e2e8f0;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        .danger-text { color: var(--danger); font-weight: 600; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            animation: scaleUp 0.2s ease-out;
        }

        @keyframes scaleUp {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h3 { margin-bottom: 16px; font-size: 18px; }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--texto-secundario);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .gps-display-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel { background: #e2e8f0; color: var(--texto); width: 40%; }

        .report-output {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.5;
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>DriverFlux</h1>
        <p>Gestão Inteligente de Corridas e Auxílios</p>
    </header>

    <div class="btn-group-main">
        <button class="btn-primary" onclick="abrirModalInsercao()">➕ Adicionar</button>
