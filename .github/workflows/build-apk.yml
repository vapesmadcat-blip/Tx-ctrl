.env:
  name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código do Repositório
      uses: actions/checkout@v4

    - name: Configurar Java JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Instalar Cordova CLI
      run: npm install -g cordova

    - name: Configurar e Adicionar Plataforma Android
      run: |
        cordova platform add android --no-telemetry

    - name: Compilar APK (Modo Debug/Aberto)
      run: |
        cordova build android --debug

    - name: Disponibilizar APK Pronto para Download
      uses: actions/upload-artifact@v4
      with:
        name: driverflux-app-apk
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk

