name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código do Repositório
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        check-latest: false

    # Força a instalação correta do Gradle para o ambiente Android do Cordova 13
    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        check-latest: false

    - name: Instalar Cordova CLI e Dependências Locais
      run: |
        npm install -g cordova
        npm install

    - name: Configurar e Adicionar Plataforma Android
      run: |
        cordova platform add android --no-telemetry --verbose

    - name: Compilar APK (Modo Debug/Aberto)
      run: |
        cordova build android --debug

    - name: Disponibilizar APK Pronto para Download
      uses: actions/upload-artifact@v4
      with:
        name: driverflux-app-apk
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
