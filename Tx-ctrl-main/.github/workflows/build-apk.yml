name: Build Android APK - TXCTRL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7
        cache-read-only: false

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar Dependências
      run: |
        npm install -g cordova
        npm install

    - name: Adicionar Plataforma Android
      run: cordova platform add android --no-telemetry --verbose

    - name: Compilar APK (Debug)
      run: cordova build android --debug --verbose

    - name: Disponibilizar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: TXCTRL-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Status Final
      if: always()
      run: echo "✅ Build concluído! APK disponível na aba 'Artifacts'"
